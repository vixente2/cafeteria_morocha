{% extends 'sidebar.html' %}
{% load static %}

{% block titulo %}Registrar Pedido{% endblock %}

{% block contenido %}
<div class="row g-4">
    <div class="form-card">
        <h2>Nuevo Pedido</h2>

        <form action="{% url 'registrarPedido' %}" method="post" autocomplete="off">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label" for="nombre_cliente">Nombre Cliente</label>
                <input type="text" class="form-control" name="nombre_cliente" id="nombre_cliente" required />
            </div>

            <div class="mb-3">
                <label class="form-label" for="id_mesa">Mesa</label>
                <select class="form-select" name="id_mesa" id="id_mesa" required>
                    <option value="">-- Seleccione una mesa --</option>
                    {% for mesa in mesas %}
                    <option value="{{ mesa.id_mesa }}" {% if mesa.nombre_estado == "Ocupado" %}disabled{% endif %}>
                        Mesa {{ mesa.num_mesa }}
                        {% if mesa.nombre_estado == "Ocupado" %} — Ocupada
                        {% elif mesa.nombre_estado == "Mantenimiento" %} — Mantenimiento
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" for="id_usuario">Mozo / Usuario</label>
                <select class="form-select" name="id_usuario" id="id_usuario" required>
                    <option value="">-- Seleccione un usuario --</option>
                    {% for usuario in usuarios %}
                    <option value="{{ usuario.id_usuario }}">{{ usuario.nombre_usuario }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Registrar y agregar detalle
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% if id_pedido %}
<script>
    const ID_PEDIDO = {{ id_pedido }};
    const CSRF_TOKEN = '{{ csrf_token }}';
    const URL_REGISTRAR = "{% url 'registrarPedido' %}";
    const URL_ESTADO = "{% url 'estadoPedido' %}";
    const productos = [
        {% for p in productos %}
    { id: { { p.id_producto } }, nombre: "{{ p.nombre_producto }}", precio: { { p.precio_producto } } },
    {% endfor %}
    ];
</script>
<script src="{% static 'appMorocha/js/registrarPedido.js' %}"></script>
{% endif %}
{% endblock %}
