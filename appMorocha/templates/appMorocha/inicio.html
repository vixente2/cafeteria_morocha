{% extends 'sidebar.html' %}
{% load static %}

{% block titulo %}Inicio{% endblock %}

{% block contenido %}

<div class="row">
    
    <h1>Estás en la Página de Inicio</h1>
    <button onclick="exportarSheets()" class="btn btn-success">
    <i class="fas fa-file-excel"></i> Exportar a Google Sheets
</button>
</a>
</div>

{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function exportarSheets() {
    Swal.fire({
        title: 'Exportando...',
        text: 'Por favor espera',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading()
        }
    });

    fetch("{% url 'exportar_sheets' %}")
        .then(response => response.json())
        .then(data => {
            Swal.fire({
                icon: 'success',
                title: '¡Listo!',
                text: 'Los datos fueron exportados a Google Sheets',
                confirmButtonColor: '#3085d6'
            });
        })
        .catch(error => {
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: 'No se pudo exportar. Intenta de nuevo.',
                confirmButtonColor: '#d33'
            });
        });
}
</script>
{% endblock %}
